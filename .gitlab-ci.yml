# ─────────────────────────────────────────────────────────────────────────────
# Pipeline CI/CD — Carrefour Mobile Automation
#
# NOTA SOBRE EXECUÇÃO DOS TESTES:
# Os testes mobile exigem um emulador Android (com KVM) ou um simulador iOS (macOS).
# Os runners COMPARTILHADOS do GitLab.com NÃO suportam virtualização aninhada (KVM),
# portanto não conseguem rodar o emulador Android diretamente.
#
# Por isso este pipeline executa um STAGE DE VALIDAÇÃO (instala dependências, valida
# a sintaxe do código e dos arquivos de dados). A execução real dos 16 cenários é
# feita:
#   • localmente, em emulador Android (npm run test:android), ou
#   • na nuvem via BrowserStack (npm run test:browserstack:android) — job opcional
#     abaixo, habilitado quando as credenciais BROWSERSTACK_* estiverem configuradas.
# ─────────────────────────────────────────────────────────────────────────────

stages:
  - validate
  - device-tests

variables:
  NODE_VERSION: "20"

# ─── Validação: dependências + sintaxe (sempre verde nos runners compartilhados) ─
validate:
  stage: validate
  image: node:20-bullseye
  before_script:
    - node --version
    - npm --version
  script:
    - echo "Instalando dependências..."
    - npm ci
    - echo "Validando sintaxe dos arquivos de configuração..."
    - node --check config/wdio.shared.conf.js
    - node --check config/wdio.android.conf.js
    - node --check config/wdio.ios.conf.js
    - node --check config/wdio.browserstack.android.conf.js
    - node --check config/wdio.browserstack.ios.conf.js
    - echo "Validando sintaxe dos Page Objects..."
    - for f in test/pageobjects/*.js; do node --check "$f"; done
    - echo "Validando sintaxe dos specs..."
    - for f in test/specs/*.js; do node --check "$f"; done
    - echo "Validando arquivos de dados (JSON)..."
    - node -e "JSON.parse(require('fs').readFileSync('data/users.json'))"
    - node -e "JSON.parse(require('fs').readFileSync('data/forms.json'))"
    - echo "✓ Validação concluída com sucesso."
  rules:
    # $CI_COMMIT_BRANCH cobre push E execução manual (web); evita pipeline sem jobs
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ─── Testes em dispositivos reais via BrowserStack (opcional) ────────────────────
# Habilitado apenas quando BROWSERSTACK_USER e BROWSERSTACK_KEY estiverem definidos
# em Settings → CI/CD → Variables. Gera relatório Allure como artefato.
browserstack-android:
  stage: device-tests
  image: node:20-bullseye
  before_script:
    - npm ci
    # Upload do APK para o BrowserStack e captura do app_url
    - |
      APP_URL=$(curl -u "$BROWSERSTACK_USER:$BROWSERSTACK_KEY" \
        -X POST "https://api-cloud.browserstack.com/app-automate/upload" \
        -F "file=@apps/android/app-release.apk" \
        | node -e "process.stdin.resume();let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).app_url))")
      export BROWSERSTACK_APP_ID=$APP_URL
  script:
    - npm run test:browserstack:android
    - npx allure generate .allure-results --clean -o allure-report
  artifacts:
    name: "allure-report-$CI_COMMIT_SHORT_SHA"
    paths:
      - allure-report/
      - reports/screenshots/
    expose_as: "Allure Report"
    when: always
    expire_in: 30 days
  rules:
    - if: '$BROWSERSTACK_USER && $BROWSERSTACK_KEY'
  allow_failure: true
